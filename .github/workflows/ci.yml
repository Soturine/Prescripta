name: CI

on:
  push:
  pull_request:

jobs:
  repository-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Text and encoding
        run: python scripts/check_text_quality.py
      - name: Markdown links
        run: python scripts/check_markdown_links.py
      - name: Assets
        run: python scripts/check_assets.py
      - name: Commit whitespace consistency
        run: git show --check --oneline --format= HEAD

  backend:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-lock.txt && python -m pip check
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Component tests
        run: npm run test -- --run
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Install E2E backend
        working-directory: backend
        run: python -m pip install -r requirements-lock.txt
      - name: Browser E2E
        run: npm run test:e2e

  smoke:
    needs: [repository-quality, backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked backend
        working-directory: backend
        run: python -m pip install -r requirements-lock.txt
      - name: Controlled API smoke
        working-directory: backend
        run: python -m pytest tests/test_product_readiness_v081.py tests/test_auth_api.py --maxfail=1

  release-readiness:
    needs: [repository-quality, backend, frontend, smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require every gate
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json, os, sys
          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {name: job["result"] for name, job in needs.items() if job["result"] != "success"}
          if failed:
              print(f"Release bloqueada: {failed}")
              sys.exit(1)
          print("Release readiness OK.")
          PY
